backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "products"
    label: "Products"
    folder: "_products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "title", widget: "string" }
      - { label: "Price (ZMW)", name: "price", widget: "number" }
      - { label: "Category", name: "category", widget: "select", options: ["case", "charger", "cable", "earphone", "powerbank", "protector"] }
      - { label: "Product Image", name: "image", widget: "image" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Featured (show on homepage slider)", name: "featured", widget: "boolean", default: false }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Hero Section"
        name: "hero"
        file: "_data/hero.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string", default: "Top Phone Accessories in Lusaka" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text", default: "Premium cases, chargers, cables & more. Fast delivery across Zambia." }
          - { label: "Primary Button Text", name: "btn_primary", widget: "string", default: "Shop Now" }
          - { label: "Secondary Button Text", name: "btn_secondary", widget: "string", default: "Order on WhatsApp" }

      - label: "Contact Information"
        name: "contact"
        file: "_data/contact.json"
        fields:
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string", default: "+260979603741" }
          - { label: "Phone Number", name: "phone", widget: "string", default: "+260979603741" }
          - { label: "Location", name: "location", widget: "string", default: "Lusaka, Zambia" }
          - { label: "Business Hours", name: "hours", widget: "string", default: "Mon–Sat: 8am – 7pm" }
