name: git-gateway
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "products"
    label: "🛍️ Products"
    label_singular: "Product"
    folder: "content/products"
    create: true
    delete: true
    slug: "{{slug}}"
    preview_path: "product.html?id={{slug}}"
    summary: "{{title}} — ZMW {{price}} [{{category}}]{{#if featured}} ⭐{{/if}}"
    sortable_fields: ["title", "price", "category"]
    fields:
      - { label: "Product Name", name: "title", widget: "string", hint: "Full product name shown on site and in WhatsApp order messages" }
      - { label: "Price (ZMW)", name: "price", widget: "number", value_type: "float", min: 0, hint: "Price in Zambian Kwacha — no currency symbol needed" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "📱 Phone Cases", value: "case" }
          - { label: "⚡ Chargers", value: "charger" }
          - { label: "🔌 Cables", value: "cable" }
          - { label: "🎧 Earphones", value: "earphone" }
          - { label: "🔋 Power Banks", value: "powerbank" }
          - { label: "🛡️ Screen Protectors", value: "protector" }
          - { label: "📲 Phones", value: "phone" }
          - { label: "✨ Other Accessories", value: "other" }
      - { label: "Product Image", name: "image", widget: "image", required: false, hint: "Upload a photo — minimum 800x800px recommended" }
      - { label: "Short Description", name: "description", widget: "text", hint: "2–4 sentences describing the product. Shown on shop page and product detail page." }
      - { label: "⭐ Feature on Homepage?", name: "featured", widget: "boolean", default: false, hint: "Turn ON to show this product in the Top Picks slider on the homepage" }
      - { label: "In Stock?", name: "in_stock", widget: "boolean", default: true, hint: "Turn OFF to hide this product from the shop" }
      - { label: "WhatsApp Order Note (optional)", name: "order_note", widget: "string", required: false, hint: "Extra info added to the WhatsApp order message, e.g. 'Available in Black, White, Blue'" }

  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - label: "🏠 Homepage Content"
        name: "homepage"
        file: "content/settings/homepage.json"
        fields:
          - { label: "Hero — Line 1 (white text)", name: "hero_line1", widget: "string", default: "Lusaka's Best", hint: "First line of the big homepage heading — shown in white" }
          - { label: "Hero — Line 2 (rainbow gradient)", name: "hero_line2", widget: "string", default: "Phone Accessories", hint: "Second line — shown with the rainbow gradient effect" }
          - { label: "Hero — Subtitle Paragraph", name: "hero_sub", widget: "text", default: "Premium cases, chargers, cables & more. Genuine products, same-day delivery across Lusaka.", hint: "The smaller text beneath the hero heading" }
          - { label: "Stat 1 — Number (e.g. 500+)", name: "stat1", widget: "string", default: "500+", hint: "Happy Customers stat" }
          - { label: "Stat 2 — Number (e.g. 1,200+)", name: "stat2", widget: "string", default: "1,200+", hint: "Products Sold stat" }
          - { label: "Stat 3 — Number (e.g. Same Day)", name: "stat3", widget: "string", default: "Same Day", hint: "Delivery stat" }
          - { label: "Stat 4 — Number (e.g. 4.9★)", name: "stat4", widget: "string", default: "4.9★", hint: "Customer Rating stat" }
          - { label: "Why Choose Us — Card 1 Title", name: "why1_title", widget: "string", default: "100% Genuine Products", required: false }
          - { label: "Why Choose Us — Card 1 Text", name: "why1_text", widget: "text", default: "Every item we sell is authentic and sourced from trusted suppliers. No fakes, no compromises.", required: false }
          - { label: "Why Choose Us — Card 2 Title", name: "why2_title", widget: "string", default: "WhatsApp Ordering", required: false }
          - { label: "Why Choose Us — Card 2 Text", name: "why2_text", widget: "text", default: "Order directly on WhatsApp — fast, easy, and personal. No complicated checkout needed.", required: false }
          - { label: "Why Choose Us — Card 3 Title", name: "why3_title", widget: "string", default: "Same-Day Delivery", required: false }
          - { label: "Why Choose Us — Card 3 Text", name: "why3_text", widget: "text", default: "Order before 3pm and get your accessories delivered the same day across Lusaka.", required: false }
          - { label: "Promo Banner Heading", name: "promo_heading", widget: "string", default: "Ready to Order? It's Easy on WhatsApp 💬", required: false }
          - { label: "Promo Banner Subtext", name: "promo_sub", widget: "text", default: "Browse the shop, pick what you need, and send us a message. We'll confirm your order and deliver to your door.", required: false }

      - label: "📞 Contact Information"
        name: "contact"
        file: "content/settings/contact.json"
        fields:
          - { label: "WhatsApp Number (digits only, e.g. 260979603741)", name: "whatsapp", widget: "string", default: "260979603741", hint: "Used in wa.me links — NO plus sign, spaces or dashes" }
          - { label: "Phone Display (e.g. +260 979 603 741)", name: "phone", widget: "string", default: "+260 979 603 741", hint: "Displayed to site visitors" }
          - { label: "Email Address", name: "email", widget: "string", default: "singbless89@gmail.com" }
          - { label: "Location / Address", name: "location", widget: "string", default: "Lusaka, Zambia" }
          - { label: "Business Hours (short)", name: "hours", widget: "string", default: "Mon–Sat: 8am – 7pm", hint: "Shown in footer and contact page" }
          - { label: "Facebook URL", name: "facebook", widget: "string", required: false, hint: "Full URL, e.g. https://facebook.com/yourpage" }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "TikTok URL", name: "tiktok", widget: "string", required: false }

      - label: "📖 About Page"
        name: "about"
        file: "content/settings/about.json"
        fields:
          - { label: "Hero Heading Line 1", name: "hero_line1", widget: "string", default: "Built for Zambia." }
          - { label: "Hero Heading Line 2 (gradient)", name: "hero_line2", widget: "string", default: "Built with Purpose." }
          - { label: "Hero Subtitle", name: "hero_sub", widget: "text", default: "We started BLESSTech-ZM to make quality phone accessories accessible to every Zambian — with honest prices, genuine products, and personal service you can count on." }
          - { label: "Story Section — Heading", name: "story_heading", widget: "string", default: "From Lusaka, for Lusaka" }
          - { label: "Story — Paragraph 1", name: "story_p1", widget: "text", default: "BLESSTech-ZM Accessories was born out of frustration — the frustration of walking into a store and being sold fake chargers, cheap cases that crack in a week, and cables that stop working after a month." }
          - { label: "Story — Paragraph 2", name: "story_p2", widget: "text", default: "We built BLESSTech-ZM on a simple promise: every product we sell is genuine, every price is fair, and every customer gets the kind of personal attention you'd get from a trusted friend." }
          - { label: "Story — Paragraph 3", name: "story_p3", widget: "text", default: "Today we serve hundreds of customers across Lusaka through WhatsApp, delivering the same day and standing behind every product we sell." }
          - { label: "Owner Name", name: "owner_name", widget: "string", default: "Barack Blessings" }
          - { label: "Owner Role", name: "owner_role", widget: "string", default: "Co-Founder & CEO" }
          - { label: "Owner Bio", name: "owner_bio", widget: "text", default: "Barack leads the vision and operations at BLESSTech-ZM, personally ensuring every product meets the quality standard he'd expect for himself." }
          - { label: "Co-Founder Name", name: "cofounder_name", widget: "string", default: "Sylvester Mwila" }
          - { label: "Co-Founder Role", name: "cofounder_role", widget: "string", default: "Co-Founder & Operations" }
          - { label: "Co-Founder Bio", name: "cofounder_bio", widget: "text", default: "Sylvester keeps the wheels turning — from logistics and supplier relations to customer fulfilment. His eye for detail is what makes same-day delivery a reality." }

      - label: "🌐 Site-Wide Settings"
        name: "sitewide"
        file: "content/settings/sitewide.json"
        fields:
          - { label: "Business Name", name: "business_name", widget: "string", default: "BLESSTech-ZM Accessories" }
          - { label: "Tagline", name: "tagline", widget: "string", default: "Lusaka's Most Trusted Phone Accessories Store" }
          - { label: "Footer Copyright Name", name: "copyright_name", widget: "string", default: "Barack Blessings" }
          - { label: "Footer Sign-Off Message", name: "signoff", widget: "string", default: "Jesus loves you. ❤️" }
          - { label: "WhatsApp Default Message", name: "wa_default_msg", widget: "string", default: "Hi! I want to order from BLESSTech-ZM." }
          - { label: "Shop Page Heading", name: "shop_heading", widget: "string", default: "Shop All Accessories", required: false }
          - { label: "Shop Page Subtitle", name: "shop_sub", widget: "string", default: "Genuine products · Fast delivery · WhatsApp ordering", required: false }
