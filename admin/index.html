<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>BLESSTech-ZM | Admin Panel</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #0f0f1a; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: "git-gateway",
          branch: "main"
        },
        media_folder: "images",
        public_folder: "/images",
        collections: [
          {
            name: "products",
            label: "Products",
            label_singular: "Product",
            folder: "content/products",
            create: true,
            delete: true,
            slug: "{{slug}}",
            identifier_field: "title",
            summary: "{{title}} – ZMW {{price}}",
            fields: [
              {
                label: "Product Name",
                name: "title",
                widget: "string"
              },
              {
                label: "Price (ZMW)",
                name: "price",
                widget: "number",
                value_type: "int"
              },
              {
                label: "Category",
                name: "category",
                widget: "select",
                options: [
                  { label: "Phone Case", value: "case" },
                  { label: "Charger", value: "charger" },
                  { label: "Cable", value: "cable" },
                  { label: "Earphone", value: "earphone" },
                  { label: "Power Bank", value: "powerbank" },
                  { label: "Screen Protector", value: "protector" },
                  { label: "Phone", value: "phone" },
                  { label: "Other", value: "other" }
                ]
              },
              {
                label: "Product Image",
                name: "image",
                widget: "image",
                required: false
              },
              {
                label: "Description",
                name: "description",
                widget: "text",
                required: false
              },
              {
                label: "Featured on Homepage",
                name: "featured",
                widget: "boolean",
                default: false
              }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
