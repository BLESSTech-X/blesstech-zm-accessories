<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>BLESSTech-ZM | Admin Panel</title>
  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #0f0f1a; }
  </style>
</head>
<body>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // ── SINGLE-FILE EMBEDDED CMS CONFIG ──
    // This replaces the need for a separate admin/config.yml file.
    // Products only – no other collections.
    CMS.init({
      config: {
        backend: {
          name: "git-gateway",
          branch: "main"
        },
        media_folder: "assets/images/uploads",
        public_folder: "/assets/images/uploads",
        collections: [
          {
            name: "products",
            label: "Products",
            label_singular: "Product",
            folder: "content/products",
            create: true,
            delete: true,
            slug: "{{slug}}",
            identifier_field: "title",
            summary: "{{title}} – ZMW {{price}} ({{category}})",
            sortable_fields: ["title", "price", "category"],
            fields: [
              {
                label: "Product Name",
                name: "title",
                widget: "string",
                hint: "e.g. 20W USB-C Fast Charger"
              },
              {
                label: "Price (ZMW)",
                name: "price",
                widget: "number",
                value_type: "float",
                min: 0,
                hint: "Enter price in Zambian Kwacha (ZMW)"
              },
              {
                label: "Category",
                name: "category",
                widget: "select",
                options: [
                  { label: "Phone Case", value: "case" },
                  { label: "Charger", value: "charger" },
                  { label: "Cable", value: "cable" },
                  { label: "Earphone / Headphone", value: "earphone" },
                  { label: "Power Bank", value: "powerbank" },
                  { label: "Screen Protector", value: "protector" },
                  { label: "Phone", value: "phone" },
                  { label: "Other Gadget", value: "other" }
                ]
              },
              {
                label: "Product Image",
                name: "image",
                widget: "image",
                required: false,
                hint: "Upload a product photo (JPG/PNG recommended, at least 600×600px)"
              },
              {
                label: "Description",
                name: "description",
                widget: "text",
                hint: "Describe the product features, compatibility, and what's included"
              },
              {
                label: "Featured on Homepage Slider",
                name: "featured",
                widget: "boolean",
                default: false,
                hint: "Turn ON to show this product in the auto-scrolling homepage slider"
              }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
