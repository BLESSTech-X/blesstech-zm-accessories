<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | BLESSTech-ZM Accessories</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ffffff; color: #1a1a2e; padding-bottom: 70px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .site-header { background: #ffffff; border-bottom: 2px solid #00d4ff; position: sticky; top: 0; z-index: 1000; padding: 15px 0; }
        .site-header .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: bold; }
        .logo i { font-size: 28px; color: #00d4ff; }
        .desktop-nav { display: flex; gap: 30px; }
        .desktop-nav a { text-decoration: none; color: #1a1a2e; font-weight: 500; }
        .desktop-nav a:hover { color: #00d4ff; }
        .btn-wa { background: #25D366; color: white; padding: 8px 18px; border-radius: 30px; text-decoration: none; }
        .hamburger { display: none; background: none; border: none; font-size: 24px; color: #00d4ff; cursor: pointer; }
        .mobile-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #ffffff; border-right: 2px solid #00d4ff; transition: left 0.3s; padding: 20px; }
        .mobile-menu.open { left: 0; }
        .close-menu { background: none; border: none; font-size: 24px; color: #00d4ff; float: right; cursor: pointer; }
        .mobile-nav { display: flex; flex-direction: column; gap: 20px; margin-top: 60px; }
        .mobile-nav a { text-decoration: none; color: #1a1a2e; font-size: 18px; padding: 10px; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; }
        .menu-overlay.active { display: block; }
        .contact-container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .contact-container h1 { color: #00d4ff; text-align: center; margin-bottom: 40px; }
        .contact-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .contact-card { background: #f8f8f8; padding: 25px; text-align: center; border-radius: 15px; }
        .contact-card i { font-size: 35px; color: #00d4ff; margin-bottom: 15px; }
        .contact-card h3 { margin-bottom: 10px; }
        .contact-card a { color: #1a1a2e; text-decoration: none; }
        .contact-form { background: #f8f8f8; padding: 30px; border-radius: 15px; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .contact-form button { background: #00d4ff; color: white; padding: 12px 30px; border: none; border-radius: 30px; cursor: pointer; }
        .form-success { display: none; margin-top: 15px; padding: 10px; background: #e8f8f5; color: #00ccaa; border-radius: 5px; text-align: center; }
        footer { background: #1a1a2e; color: #ccc; text-align: center; padding: 30px 20px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #ffffff; display: flex; justify-content: space-around; padding: 10px 0 15px; border-top: 2px solid #00d4ff; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #888; }
        .nav-item.active, .nav-item:hover { color: #00d4ff; }
        @media (max-width: 768px) { .desktop-nav { display: none; } .hamburger { display: block; } }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container">
            <div class="logo"><i class="fas fa-mobile-alt"></i><span>BLESSTech-<span style="color:#00d4ff;">ZM</span> Accessories</span></div>
            <nav class="desktop-nav"><a href="index.html">Home</a><a href="shop.html">Shop</a><a href="about.html">About</a><a href="contact.html">Contact</a></nav>
            <div class="header-actions"><a href="https://wa.me/260979603741" class="btn-wa"><i class="fab fa-whatsapp"></i> Chat</a><button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button></div>
        </div>
    </header>

    <div class="mobile-menu" id="mobileMenu">
        <button class="close-menu" id="closeMenuBtn"><i class="fas fa-times"></i></button>
        <nav class="mobile-nav"><a href="index.html">Home</a><a href="shop.html">Shop</a><a href="about.html">About</a><a href="contact.html">Contact</a></nav>
    </div>
    <div class="menu-overlay" id="menuOverlay"></div>

    <div class="contact-container">
        <h1 id="contactTitle">Contact Us</h1>
        <div class="contact-info" id="contactInfo"></div>
        <div class="contact-form">
            <h2>Send us a message</h2>
            <form id="contactForm">
                <input type="text" id="name" placeholder="Your Name" required>
                <input type="email" id="email" placeholder="Your Email" required>
                <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
            <div id="formSuccess" class="form-success">Message sent! We'll reply within 24 hours.</div>
        </div>
    </div>

    <footer><div class="container"><p>&copy; 2026 BLESSTech-ZM Accessories. Jesus loves you. ❤️</p></div></footer>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="shop.html" class="nav-item"><i class="fas fa-store"></i><span>Shop</span></a>
        <a href="https://wa.me/260979603741" class="nav-item"><i class="fab fa-whatsapp"></i><span>Order</span></a>
        <a href="contact.html" class="nav-item active"><i class="fas fa-envelope"></i><span>Contact</span></a>
    </div>

    <script>
        const hamburger = document.getElementById('hamburgerBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        const closeBtn = document.getElementById('closeMenuBtn');
        const overlay = document.getElementById('menuOverlay');
        if (hamburger) hamburger.addEventListener('click', () => { mobileMenu.classList.add('open'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; });
        function closeMenu() { mobileMenu.classList.remove('open'); overlay.classList.remove('active'); document.body.style.overflow = ''; }
        if (closeBtn) closeBtn.addEventListener('click', closeMenu);
        if (overlay) overlay.addEventListener('click', closeMenu);

        async function loadContact() {
            try {
                const res = await fetch('/content/pages/contact.json');
                const data = await res.json();
                document.getElementById('contactTitle').innerHTML = data.title;
                document.getElementById('contactInfo').innerHTML = `
                    <div class="contact-card"><i class="fab fa-whatsapp"></i><h3>WhatsApp</h3><p><a href="https://wa.me/${data.whatsapp}">${data.whatsapp}</a></p></div>
                    <div class="contact-card"><i class="fas fa-phone-alt"></i><h3>Phone</h3><p><a href="tel:${data.phone}">${data.phone}</a></p></div>
                    <div class="contact-card"><i class="fas fa-map-marker-alt"></i><h3>Location</h3><p>${data.location}</p></div>
                    <div class="contact-card"><i class="fas fa-clock"></i><h3>Hours</h3><p>${data.hours}</p></div>
                `;
            } catch(e) { console.log('Loading contact...'); }
        }
        loadContact();

        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const success = document.getElementById('formSuccess');
            success.style.display = 'block';
            this.reset();
            setTimeout(() => success.style.display = 'none', 5000);
        });
    </script>
</body>
</html>
